<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Manna One Solution</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#87f3fd",
                    "error": "#ba1a1a",
                    "primary": "#006970",
                    "on-primary-fixed-variant": "#004f55",
                    "on-tertiary-fixed": "#1b1c1c",
                    "surface-bright": "#f7f9ff",
                    "secondary-fixed-dim": "#7bd4dd",
                    "inverse-primary": "#69d6e1",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#373636",
                    "primary-container": "#3aafb9",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#2d3135",
                    "surface": "#f7f9ff",
                    "on-surface-variant": "#3d494a",
                    "secondary-container": "#95eef6",
                    "on-background": "#181c20",
                    "tertiary-container": "#a19f9f",
                    "on-secondary-fixed": "#002022",
                    "surface-container": "#ebeef3",
                    "tertiary-fixed": "#e4e2e1",
                    "on-tertiary-fixed-variant": "#474747",
                    "primary-fixed-dim": "#69d6e1",
                    "surface-tint": "#006970",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#c8c6c5",
                    "on-error": "#ffffff",
                    "surface-variant": "#e0e3e8",
                    "surface-container-highest": "#e0e3e8",
                    "secondary": "#006970",
                    "surface-container-high": "#e5e8ee",
                    "tertiary": "#5f5e5e",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f1f4f9",
                    "on-error-container": "#93000a",
                    "background": "#f7f9ff",
                    "outline": "#6d797a",
                    "secondary-fixed": "#98f1f9",
                    "surface-dim": "#d7dadf",
                    "on-surface": "#181c20",
                    "on-primary-fixed": "#002022",
                    "on-secondary-container": "#006e75",
                    "on-primary-container": "#003d42",
                    "on-primary": "#ffffff",
                    "outline-variant": "#bcc9ca",
                    "inverse-on-surface": "#eef1f6",
                    "on-secondary-fixed-variant": "#004f54"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F1F3F5; /* Specific light gray requested */
        }
        .glass-header {
            backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .shadow-premium {
            box-shadow: 0 12px 32px -4px rgba(0, 105, 112, 0.08);
        }
        .logo-gradient {
            background: linear-gradient(135deg, #006970 0%, #3AAFB9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 overflow-x-hidden selection:bg-primary-container selection:text-white">
<!-- Shell Suppression: Login screen is transactional, so TopNavBar and SideNavBar are omitted as per protocol. -->
<main class="w-full max-w-[420px] animate-in fade-in duration-700">
<!-- Login Card Container -->
<div class="bg-surface-container-lowest rounded-lg shadow-premium p-10 flex flex-col items-center">
<!-- Logo Area -->
<div class="mb-10 text-center">
<div class="flex items-center justify-center mb-4">
<div class="relative w-12 h-12 flex items-center justify-center">
<!-- Stylized Interlocking M Lettermark Representation -->
<span class="material-symbols-outlined text-5xl text-primary-container font-bold" style="font-variation-settings: 'FILL' 1;">
                            domain
                        </span>
<div class="absolute -bottom-1 -right-1 bg-surface-container-lowest rounded-full p-0.5">
<div class="w-3 h-3 bg-primary rounded-full"></div>
</div>
</div>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-[#2C2C2C] mb-0.5">MANNA</h1>
<p class="text-[10px] font-bold tracking-[0.2em] text-primary-container uppercase">ONE SOLUTION</p>
</div>
<!-- Welcome Text -->
<div class="w-full mb-8">
<h2 class="text-2xl font-semibold text-[#212529] tracking-tight mb-1">Welcome Back</h2>
<p class="text-sm text-tertiary font-medium">Sign in to your staff account</p>
</div>
<!-- Form -->
<form action="#" class="w-full space-y-5" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative group">
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/20 rounded-lg text-sm text-on-surface focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all outline-none placeholder:text-outline-variant" id="email" name="email" placeholder="you@mannaonesolution.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-[11px] font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/20 rounded-lg text-sm text-on-surface focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all outline-none placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign In Button -->
<div class="pt-4">
<button class="w-full bg-primary-container hover:bg-primary text-white font-bold py-3.5 px-6 rounded-lg transition-all duration-200 transform active:scale-[0.98] flex justify-center items-center gap-2 group" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Optional MFA Prompt (Minimalist) -->
<div class="mt-8 pt-8 border-t border-surface-container w-full">
<div class="flex items-center gap-3 p-3 bg-surface-container-low rounded-lg">
<span class="material-symbols-outlined text-primary-container">shield_person</span>
<p class="text-[11px] text-on-surface-variant leading-relaxed">
                        Single Sign-On (SSO) enabled. Ensure you are using your corporate VPN for access.
                    </p>
</div>
</div>
</div>
<!-- Footer Area -->
<footer class="mt-8 text-center space-y-1">
<p class="text-[11px] font-medium text-outline uppercase tracking-widest">
                Manna One Solution — One Stop, All Solutions.
            </p>
<div class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xs text-outline/60">location_on</span>
<p class="text-[11px] font-medium text-outline/60 uppercase tracking-widest">Houston, TX</p>
</div>
</footer>
</main>
<!-- Decoration-free background reinforcement per instructions -->
<div class="fixed inset-0 -z-10 bg-[#F1F3F5]"></div>
</body></html>
